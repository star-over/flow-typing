<!doctype html>
<!--
  Privacy Policy — standalone static page (P0-4, variant A).

  Served at /privacy directly by Cloudflare Pages (a real file wins over the SPA
  fallback in static/_redirects). Rendered WITHOUT JavaScript so the Google OAuth
  verifier and other crawlers read the full text — same reason P0-8 put share
  meta in app.html.

  GENERATED FILE — do not hand-edit static/privacy/index.html. Source of truth is
  the three files in docs/legal/: the text (privacy-policy.md) plus this head and
  the foot partial. Regenerate after any change to them (requires pandoc):

    pandoc docs/legal/privacy-policy.md -f markdown-smart -t html \
      | cat docs/legal/privacy-page.head.html - docs/legal/privacy-page.foot.html \
      > static/privacy/index.html

  Fully self-contained: no external requests. Fonts are self-hosted (mirrors
  src/app.css @font-face -> /fonts/*.woff2); the neutral achromatic palette is
  copied from src/themes/{light,dark}.css. Per DESIGN.md, saturation is reserved
  for the motion visualization, so links here stay neutral (underlined text).
  This page lives outside the app's component i18n (ADR 0022) by design, exactly
  like app.html — crawler-facing static content.
-->

<meta name="color-scheme" content="light dark" />

:root {
  color-scheme: light;
  --bg: oklch(1 0 0);
  --surface: oklch(0.95 0 0);
  --border: oklch(0.9 0 0);
  --text: oklch(0.14 0 0);
  --text-secondary: oklch(0.44 0 0);
  --text-muted: oklch(0.56 0 0);
}
@media (prefers-color-scheme: dark) {
  :root {
    color-scheme: dark;
    --bg: oklch(0.14 0 0);
    --surface: oklch(0.20 0 0);
    --border: oklch(0.30 0 0);
    --text: oklch(0.96 0 0);
    --text-secondary: oklch(0.72 0 0);
    --text-muted: oklch(0.62 0 0);
  }
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: 'Geist', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.wrap { max-width: 46rem; margin: 0 auto; padding-inline: 1.5rem; }

.site-header { border-bottom: 1px solid var(--border); }
.site-header .wrap { display: flex; align-items: center; min-height: 3.5rem; }
.brand { font-weight: 600; font-size: 0.95rem; color: var(--text); text-decoration: none; }
.brand:hover { text-decoration: underline; }

main.policy { padding-block: 2.5rem 4rem; }
main.policy h1 { font-size: 1.65rem; font-weight: 700; letter-spacing: -0.01em; line-height: 1.25; margin: 0 0 1.5rem; }
/* Language dividers: pandoc auto-ids from the "# English version" /
   "# Русская версия" headings. Rendered as quiet labels, not page titles. */
main.policy h1[id="english-version"],
main.policy h1[id="русская-версия"] {
  font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-muted); margin: 2.5rem 0 1.25rem;
}
main.policy h2 { font-size: 1.2rem; font-weight: 600; line-height: 1.3; margin: 2.25rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
main.policy h3 { font-size: 1rem; font-weight: 600; color: var(--text-secondary); margin: 1.5rem 0 0.5rem; }
main.policy p { margin: 0 0 1rem; color: var(--text-secondary); }
main.policy strong { color: var(--text); font-weight: 600; }
main.policy ul { margin: 0 0 1rem; padding-left: 1.25rem; color: var(--text-secondary); }
main.policy li { margin: 0.3rem 0; }
main.policy a { color: var(--text); text-decoration: underline; text-underline-offset: 2px; }
main.policy a:hover { color: var(--text-muted); }
main.policy code { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 0.88em; color: var(--text-muted); background: var(--surface); padding: 0.1em 0.35em; border-radius: 3px; }
main.policy hr { border: none; border-top: 1px solid var(--border); margin: 2.25rem 0; }

.site-footer { border-top: 1px solid var(--border); }
.site-footer .wrap { padding-block: 1.5rem; color: var(--text-muted); font-size: 0.85rem; display: flex; gap: 1.25rem; flex-wrap: wrap; }
.site-footer a { color: var(--text-muted); text-decoration: underline; text-underline-offset: 2px; }
</style>
</head>
