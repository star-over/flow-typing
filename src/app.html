<!DOCTYPE html>
<html lang="%sveltekit.lang%">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // FOUC-free theme bootstrap. Synchronous, выполняется до парсинга
      // %sveltekit.head% (CSS-link инжектится туда) — атрибут `data-theme`
      // установлен к первому match-у стилей. Mirror-key пишет subscriber
      // в `src/lib/preferences.ts`.
      try {
        var t = localStorage.getItem('flow-typing-theme');
        if (!t || t === 'auto') {
          t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.dataset.theme = t;
      } catch (_) {
        var mq = typeof matchMedia === 'function' ? matchMedia('(prefers-color-scheme: dark)') : null;
        document.documentElement.dataset.theme = mq && mq.matches ? 'dark' : 'light';
      }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
