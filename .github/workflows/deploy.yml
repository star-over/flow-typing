# Production deploy: push Convex functions/schema/indexes to the prod
# deployment AND build+publish the static SPA to Cloudflare Pages, in one run.
#
# One `convex deploy --cmd` pushes the backend to prod and then runs the frontend
# build with the prod Convex URL injected as PUBLIC_CONVEX_URL, so the client is
# always built against the same deployment its functions were just pushed to
# (plan §4). The built `build/` is then uploaded to CF Pages via wrangler.
#
# ── One-time setup before this workflow can run (see docs/deploy/prod-bootstrap.md) ──
#   GitHub → Settings → Secrets and variables → Actions:
#     • CONVEX_DEPLOY_KEY     — Convex prod deploy key (Dashboard → prod → Deploy Keys)
#     • CLOUDFLARE_API_TOKEN  — token scoped to "Cloudflare Pages: Edit"
#     • CLOUDFLARE_ACCOUNT_ID — Cloudflare account id
#   Repo variable (Settings → Variables → Actions), optional override of the default:
#     • CF_PAGES_PROJECT      — CF Pages project name (defaults to "flow-typing")
#
# NB: no PUBLIC_DEV_LOGIN* is present in CI → the dev-login button is never baked
# into the prod bundle (ADR 0012). PUBLIC_CONVEX_URL is provided by convex deploy
# via --cmd-url-env-var-name; it is the ONLY public env var the build needs.

name: Deploy to production

on:
  push:
    branches: [master]
  workflow_dispatch:

# Never let two prod deploys overlap; let an in-flight one finish (don't cancel
# a half-applied Convex schema push).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # convex is a dev dependency — install before invoking `npx convex`.
      - name: Install dependencies
        run: npm ci

      # Push backend to prod, then build the SPA with the prod Convex URL exposed
      # as PUBLIC_CONVEX_URL (consumed via $env/static/public). `make build`'s
      # install step is a no-op here (node_modules already fresh from npm ci).
      - name: Deploy Convex (prod) + build SPA
        run: npx convex deploy --cmd "make build" --cmd-url-env-var-name PUBLIC_CONVEX_URL
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --branch=master marks this as a PRODUCTION deployment (must equal the
          # CF Pages project's configured production branch).
          command: >-
            pages deploy build
            --project-name=${{ vars.CF_PAGES_PROJECT || 'flow-typing' }}
            --branch=master
